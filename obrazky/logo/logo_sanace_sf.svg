<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <style>
      .company-name { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 28px; fill: #333333; }
      .tagline { font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 12px; fill: #B17A65; }
      .icon-bg { fill: #59707e; }
      .icon-detail { fill: #ffffff; }
      .accent { fill: #B17A65; }
    </style>
  </defs>
  
  <!-- Icon background circle -->
  <circle cx="35" cy="40" r="30" class="icon-bg"/>
  
  <!-- Cleaning icon - stylized brush/cleaning tool -->
  <g transform="translate(35, 40)">
    <!-- Brush handle -->
    <rect x="-2" y="-20" width="4" height="25" class="icon-detail"/>
    <!-- Brush bristles -->
    <rect x="-8" y="-23" width="16" height="8" rx="4" class="icon-detail"/>
    <!-- Cleaning bubbles -->
    <circle cx="-12" cy="-10" r="3" class="icon-detail" opacity="0.8"/>
    <circle cx="15" cy="-5" r="2" class="icon-detail" opacity="0.6"/>
    <circle cx="12" cy="8" r="2.5" class="icon-detail" opacity="0.7"/>
  </g>
  
  <!-- Company name -->
  <text x="80" y="35" class="company-name">Sanace SF</text>
  
  <!-- Tagline -->
  <text x="80" y="52" class="tagline">Profesionální čištění • Po celé ČR</text>
  
  <!-- Decorative accent line -->
  <line x1="80" y1="58" x2="280" y2="58" stroke="#B17A65" stroke-width="2" opacity="0.3"/>
</svg>